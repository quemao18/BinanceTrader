name: BinanceTrader Bot

on:
  schedule:
    - cron: "*/15 * * * *"   # Every 15 minutes — fits within GitHub free tier (2000 min/month)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  trade:
    name: Run trading cycle
    runs-on: ubuntu-latest
    timeout-minutes: 5        # Kill if hangs — protects against runaway usage

    env:
      # --- Secrets (set these in: Settings > Secrets and variables > Actions) ---
      API_KEY: ${{ secrets.API_KEY }}
      SECRET:  ${{ secrets.SECRET }}

      # --- Non-secret runtime config ---
      TRADING_PAIR:              ${{ vars.TRADING_PAIR              || 'BTCUSDT' }}
      TIMEFRAME:                 ${{ vars.TIMEFRAME                 || '15m' }}
      TESTNET:                   ${{ vars.TESTNET                   || 'false' }}
      TRADE_MODE:                ${{ vars.TRADE_MODE                || 'spot' }}
      SKIP_FETCH_CURRENCIES:     ${{ vars.SKIP_FETCH_CURRENCIES     || 'true' }}
      SINGLE_RUN:                "true"
      MAX_CYCLES_PER_RUN:        "1"
      ONLY_NEW_CANDLE:           ${{ vars.ONLY_NEW_CANDLE           || 'true' }}
      MAX_POSITION_PCT:          ${{ vars.MAX_POSITION_PCT          || '0.25' }}
      BUY_THRESHOLD:             ${{ vars.BUY_THRESHOLD             || '0.60' }}
      SELL_THRESHOLD:            ${{ vars.SELL_THRESHOLD            || '0.40' }}
      AUTO_LOAD_BEST_THRESHOLDS: "false"
      REQUIRE_GO_NO_GO:          "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements_specific.txt

      - name: Run trading cycle
        run: python BinanceTrader.py
